<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Prototype: retreat-compiler</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#efe6d3;--paper-2:#f5edd9;--paper-3:#e3d7bd;
    --moss:#1a2e21;--moss-2:#2a4632;--moss-3:#456752;
    --brass:#a8854a;--brass-2:#c9a567;--brass-3:#e8d4a8;
    --oxblood:#6b1f1f;--ink:#0a0a0a;--cream:#fbf6e9;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:'Inter Tight',system-ui,sans-serif;background:var(--paper);color:var(--moss);font-size:14px;line-height:1.5}
  .serif{font-family:'Fraunces',serif}
  .serif-it{font-family:'Fraunces',serif;font-style:italic}
  .mono{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.02em}
  .bg-paper{background:var(--paper)}.bg-paper-2{background:var(--paper-2)}.bg-paper-3{background:var(--paper-3)}
  .bg-moss{background:var(--moss)}.bg-moss-2{background:var(--moss-2)}
  .bg-brass{background:var(--brass)}.bg-brass-3{background:var(--brass-3)}
  .bg-oxblood{background:var(--oxblood)}.bg-cream{background:var(--cream)}
  .text-moss{color:var(--moss)}.text-moss-3{color:var(--moss-3)}.text-brass{color:var(--brass)}
  .text-paper{color:var(--paper)}.text-cream{color:var(--cream)}.text-oxblood{color:var(--oxblood)}
  .border-moss{border-color:var(--moss)}.border-brass{border-color:var(--brass)}.border-paper-3{border-color:var(--paper-3)}
  .banner{position:fixed;bottom:0;left:0;right:0;background:var(--oxblood);color:var(--cream);text-align:center;padding:6px 12px;font-size:11px;letter-spacing:.08em;text-transform:uppercase;z-index:50;font-weight:500}
  .topbar{position:sticky;top:0;background:var(--moss);color:var(--cream);padding:10px 16px;display:flex;align-items:center;gap:12px;z-index:40;border-bottom:1px solid var(--brass)}
  .topbar a,.topbar button{color:var(--cream);text-decoration:none;padding:4px 8px;border-radius:4px;font-size:12px;cursor:pointer;background:transparent;border:1px solid transparent}
  .topbar a:hover,.topbar button:hover{background:var(--moss-2);border-color:var(--brass)}
  .crumb{flex:1;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--brass-2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .crumb b{color:var(--cream);font-weight:500}
  .container-x{max-width:1080px;margin:0 auto;padding:24px 16px 80px}
  .pill{display:inline-flex;align-items:center;gap:4px;padding:2px 10px;border-radius:999px;font-size:11px;font-weight:500;letter-spacing:.02em;border:1px solid currentColor}
  .pill-moss{color:var(--moss);background:var(--paper-2)}.pill-brass{color:#7a5d2f;background:var(--brass-3)}
  .pill-oxblood{color:var(--oxblood);background:#f5d8d8}.pill-green{color:#1a4d2e;background:#cce6d5}
  .card{background:var(--cream);border:1px solid var(--paper-3);border-radius:6px;padding:18px;transition:all .15s}
  .card:hover{border-color:var(--brass);transform:translateY(-1px)}
  .card-flat{background:var(--cream);border:1px solid var(--paper-3);border-radius:6px;padding:18px}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:4px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid;transition:all .15s;text-decoration:none}
  .btn-moss{background:var(--moss);color:var(--cream);border-color:var(--moss)}
  .btn-moss:hover{background:var(--moss-2)}
  .btn-brass{background:var(--brass);color:var(--cream);border-color:var(--brass)}
  .btn-brass:hover{background:#8e6f3a}
  .btn-out{background:transparent;color:var(--moss);border-color:var(--moss)}
  .btn-out:hover{background:var(--moss);color:var(--cream)}
  .btn-ghost{background:transparent;color:var(--moss);border-color:transparent}
  .btn-ghost:hover{background:var(--paper-3)}
  .input{width:100%;padding:10px 12px;border:1px solid var(--paper-3);border-radius:4px;background:var(--cream);font-family:inherit;font-size:14px;color:var(--moss)}
  .input:focus{outline:none;border-color:var(--brass);box-shadow:0 0 0 3px rgba(168,133,74,.2)}
  textarea.input{min-height:60px;resize:vertical;font-family:'JetBrains Mono',monospace;font-size:13px}
  .h1{font-family:'Fraunces',serif;font-size:32px;line-height:1.1;font-weight:500;letter-spacing:-.01em}
  .h1 em{font-style:italic;color:var(--brass)}
  .h2{font-family:'Fraunces',serif;font-size:22px;line-height:1.2;font-weight:500}
  .h3{font-family:'Inter Tight',sans-serif;font-size:13px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--moss-3)}
  .lbl{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--moss-3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
  .grid-3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px}
  .grid-2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}
  @media(max-width:768px){.grid-3,.grid-2{grid-template-columns:1fr}}
  .day-row{display:grid;grid-template-columns:60px 1fr;gap:16px;padding:14px 0;border-bottom:1px solid var(--paper-3)}
  .day-row:last-child{border-bottom:none}
  .day-num{font-family:'Fraunces',serif;font-size:28px;font-weight:500;color:var(--brass);line-height:1}
  .slot{display:grid;grid-template-columns:80px 1fr;gap:8px;font-size:13px;margin-top:4px}
  .slot b{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--moss-3);text-transform:uppercase;letter-spacing:.06em;font-weight:500}
  .progress{height:3px;background:var(--paper-3);border-radius:2px;overflow:hidden;margin:8px 0 16px}
  .progress-bar{height:100%;background:var(--brass);transition:width .3s}
  .step{display:flex;align-items:center;gap:10px;padding:8px 0;color:var(--moss-3)}
  .step.active{color:var(--moss)}.step.done{color:var(--moss-3)}
  .step-dot{width:18px;height:18px;border-radius:50%;border:2px solid currentColor;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;font-weight:600}
  .step.done .step-dot{background:currentColor;color:var(--cream)}
  .step.active .step-dot{background:var(--brass);color:var(--cream);border-color:var(--brass)}
  .tab-bar{display:flex;border-bottom:1px solid var(--paper-3);gap:0;margin-bottom:16px}
  .tab{padding:10px 16px;cursor:pointer;font-size:13px;color:var(--moss-3);border-bottom:2px solid transparent;background:transparent;border-top:none;border-left:none;border-right:none;font-family:inherit}
  .tab.active{color:var(--moss);border-bottom-color:var(--brass);font-weight:500}
  .pdf-frame{background:var(--cream);border:1px solid var(--paper-3);min-height:380px;padding:24px;position:relative;overflow:hidden;border-radius:2px}
  .pdf-frame::before{content:'PAGE 1 OF 9';position:absolute;top:8px;right:12px;font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--moss-3);letter-spacing:.1em}
  .funnel-frame{background:var(--cream);border:1px solid var(--paper-3);min-height:380px;border-radius:6px;overflow:hidden}
  .design-tile{cursor:pointer;border:2px solid var(--paper-3);border-radius:6px;padding:14px;background:var(--cream);transition:all .2s}
  .design-tile.selected{border-color:var(--brass);background:var(--paper-2)}
  .design-tile:hover{border-color:var(--brass-2)}
  .lunar{display:inline-block;width:14px;height:14px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#fbf6e9 0%,#d6c89a 100%);box-shadow:0 0 0 1px var(--brass);vertical-align:middle;margin-right:4px}
  .err{background:#f5d8d8;border:1px solid var(--oxblood);color:var(--oxblood);padding:10px 14px;border-radius:4px;font-size:13px}
  .ok{background:#cce6d5;border:1px solid #1a4d2e;color:#1a4d2e;padding:10px 14px;border-radius:4px;font-size:13px}
  .recent{display:grid;grid-template-columns:120px 1fr 100px 120px;gap:12px;padding:10px 12px;border-bottom:1px solid var(--paper-3);font-size:13px;align-items:center;cursor:pointer}
  .recent:hover{background:var(--paper-2)}
  .recent .ridx{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--brass)}
  .table{width:100%;border-collapse:collapse;font-size:13px}
  .table th,.table td{padding:8px 12px;text-align:left;border-bottom:1px solid var(--paper-3)}
  .table th{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--moss-3);text-transform:uppercase;letter-spacing:.06em;font-weight:500;background:var(--paper-2)}
  .glyph{font-family:'Fraunces',serif;font-style:italic;color:var(--brass)}
  .qr{width:80px;height:80px;background:repeating-linear-gradient(0deg,var(--moss) 0 4px,transparent 4px 8px),repeating-linear-gradient(90deg,var(--moss) 0 4px,transparent 4px 8px);background-color:var(--cream);border:1px solid var(--moss)}
  .num{font-family:'Fraunces',serif;font-size:22px;font-weight:500;color:var(--moss)}
  .num-lg{font-family:'Fraunces',serif;font-size:32px;font-weight:500;color:var(--moss);line-height:1}
  .num-xl{font-family:'Fraunces',serif;font-size:48px;font-weight:500;color:var(--moss);line-height:1}
  .ribbon{position:absolute;top:12px;right:12px;background:var(--brass);color:var(--cream);padding:3px 10px;font-size:10px;letter-spacing:.08em;text-transform:uppercase;border-radius:2px;font-weight:500}
  .check-list{list-style:none;padding:0;margin:0}
  .check-list li{position:relative;padding-left:20px;font-size:13px;line-height:1.6}
  .check-list li::before{content:'✓';position:absolute;left:0;color:var(--brass);font-weight:600}
  .x-list li::before{content:'×';color:var(--oxblood)}
  .stripe{background:repeating-linear-gradient(135deg,var(--paper-2) 0 8px,var(--paper-3) 8px 16px)}
  .deploy-shell{background:#0d1810;color:#9bd3a6;font-family:'JetBrains Mono',monospace;font-size:11px;padding:14px;border-radius:4px;line-height:1.7}
  .blink{animation:blink 1.2s infinite}
  @keyframes blink{50%{opacity:.3}}
  .skel{background:linear-gradient(90deg,var(--paper-2) 0%,var(--paper-3) 50%,var(--paper-2) 100%);background-size:200% 100%;animation:skel 1.4s infinite;height:14px;border-radius:2px}
  @keyframes skel{0%{background-position:200% 0}100%{background-position:-200% 0}}
  .public-hero{height:280px;background:linear-gradient(rgba(26,46,33,.55),rgba(26,46,33,.75)),url('https://images.unsplash.com/photo-1518709268805-4e9042af2176?w=1200');background-size:cover;background-position:center;display:flex;align-items:flex-end;padding:24px;color:var(--cream)}
  .toggle-row{display:flex;gap:8px;align-items:center;padding:6px 0}
  .toggle{width:32px;height:18px;background:var(--paper-3);border-radius:9px;position:relative;cursor:pointer;transition:all .2s}
  .toggle.on{background:var(--brass)}
  .toggle::after{content:'';position:absolute;top:2px;left:2px;width:14px;height:14px;background:var(--cream);border-radius:50%;transition:all .2s}
  .toggle.on::after{left:16px}
  details summary{cursor:pointer;list-style:none;padding:8px 0}
  details summary::-webkit-details-marker{display:none}
  details[open] summary{border-bottom:1px solid var(--paper-3);margin-bottom:8px}
  .badge-rec{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;background:var(--moss);color:var(--cream);font-size:10px;letter-spacing:.06em;text-transform:uppercase;border-radius:2px;font-weight:500}
  .logo{font-family:'Fraunces',serif;font-style:italic;font-size:14px;font-weight:500}
  .slh{font-family:'Inter Tight';font-size:9px;letter-spacing:.2em;color:var(--brass-2)}
  .form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
  @media(max-width:768px){.form-grid{grid-template-columns:1fr}}
  .pricing-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;font-size:13px}
  .pricing-grid > div{padding:8px 0;border-bottom:1px solid var(--paper-3)}
  .pricing-grid > div:nth-child(2n){text-align:right;font-family:'JetBrains Mono',monospace}
</style>
</head>
<body class="bg-paper">
  <nav class="topbar">
    <a href="#/" class="logo">Namkhan <span class="slh">/ COMPILER</span></a>
    <button onclick="history.back()">← back</button>
    <div class="crumb" id="crumb"></div>
    <button onclick="resetProto()">reset</button>
  </nav>
  <main id="app"></main>
  <div class="banner">PROTOTYPE — not real data — testing only</div>

<script>
const STATE_KEY='proto_retreat_compiler_v1';
const getState=()=>JSON.parse(localStorage.getItem(STATE_KEY)||'{}');
const setState=s=>localStorage.setItem(STATE_KEY,JSON.stringify(s));
const update=p=>{const s=getState();setState({...s,...p})};
function resetProto(){if(confirm('Reset all prototype data?')){localStorage.removeItem(STATE_KEY);location.hash='';location.reload()}}
function getQuery(){const h=location.hash.split('?')[1]||'';const o={};h.split('&').filter(Boolean).forEach(p=>{const[k,v]=p.split('=');o[k]=decodeURIComponent(v||'')});return o}
function nav(h){location.hash=h}
function fmt$(n){return '$'+n.toLocaleString('en-US')}
function setCrumb(parts){document.getElementById('crumb').innerHTML=parts.map((p,i)=>i===parts.length-1?'<b>'+p+'</b>':p).join(' / ')}

// MOCK DATA
const MOCK_RUNS=[
  {id:'R-001',prompt:'5 day mindfulness retreat — lux only — green season — 8 pax',status:'ready',created:'2026-05-03 09:14',cost:0.18},
  {id:'R-000',prompt:'3 day river folklore — mid + lux — dry season — 12 pax',status:'deployed',created:'2026-04-28 15:22',cost:0.42,subdomain:'river-folklore-dry.thenamkhan.com'},
  {id:'R-002',prompt:'7 day detox + meditation — 3 tiers — full year — couples',status:'rendering',created:'2026-05-03 09:31',cost:0.31},
  {id:'R-003',prompt:'4 day retreat life — lux — full moon Oct 2026 — 6 pax',status:'draft',created:'2026-05-03 10:02',cost:0.12}
];
const VARIANTS={
 'R-001':[
  {id:'A',label:'Garden View',total:15120,perPax:1890,marginPct:32,occ:'8 of 10 rooms',room:'Garden Room ×4',activities:'Group',fnb:'Half Board',addons:'Spa pack +$240/pax'},
  {id:'B',label:'River View',total:18320,perPax:2290,marginPct:38,occ:'8 of 10 rooms',room:'River Suite ×4',activities:'Mixed (group + private)',fnb:'Full Board',recommended:true,addons:'Spa + photographer +$420/pax'},
  {id:'C',label:'River Villa',total:23120,perPax:2890,marginPct:41,occ:'4 villas',room:'River Villa ×4 (2pax/villa)',activities:'Private',fnb:'All-inclusive',addons:'Private chef + helicopter +$890/pax'}
 ]
};
const DAY_STRUCT={
 'R-001-B':[
  {day:1,title:'Arrival & Welcome',morning:'Cloudbeds airport transfer · meet & greet',afternoon:'Welcome ceremony with Sebastian · room handover',evening:'Sunset meditation on river deck · light dinner at The Roots',sku:['NMK-TRN-001','NMK-CER-014','NMK-FNB-022']},
  {day:2,title:'Sacred Waters',morning:'Kuang Si Falls — private guide, MandaLao partner',afternoon:'Lunch at Tat Sae village · leisure',evening:'90-min sound bath · spa ritual',sku:['NMK-EXC-007','NMK-SPA-019']},
  {day:3,title:'Full Moon Lunar Alignment',morning:'Alms ceremony 6am · river breakfast',afternoon:'Free time · optional spa',evening:'Full moon meditation · 5-course Lao chef dinner',sku:['NMK-CER-002','NMK-FNB-031'],lunar:true},
  {day:4,title:'River Tales',morning:'River cruise with elder storyteller',afternoon:'Hand-weaving workshop · Ock Pop Tok partner',evening:'Private dinner at The Roots',sku:['NMK-EXC-011','NMK-EXC-022','NMK-FNB-040']},
  {day:5,title:'Departure',morning:'Closing meditation · gift bag',afternoon:'Cloudbeds airport transfer',evening:'',sku:['NMK-CER-008','NMK-TRN-001']}
 ]
};

// ROUTES
const routes={
 '':renderHome,'/':renderHome,
 '/compile':renderCompile,'/result':renderResult,'/variant':renderVariant,
 '/edit':renderEdit,'/preview':renderPreview,'/deploy':renderDeploy,'/success':renderSuccess,
 '/funnel/lead':renderFunnelLead,'/funnel/detail':renderFunnelDetail,
 '/funnel/checkout':renderFunnelCheckout,'/funnel/booked':renderFunnelBooked,
 '/empty':renderEmpty,'/error':renderError
};
function router(){
 const path=location.hash.slice(1).split('?')[0]||'';
 const h=routes[path]||renderNotFound;
 h();
}
window.addEventListener('hashchange',router);
window.addEventListener('load',router);

// SCREENS
function renderHome(){
 setCrumb(['compiler','home']);
 const s=getState();
 const hasRuns=true; // toggle to false to test empty
 document.getElementById('app').innerHTML=`
  <div class="container-x">
   <div class="mb-6">
    <div class="lbl">Step 1 · enter prompt</div>
    <h1 class="h1">Compile a <em>retreat package</em></h1>
    <p class="text-moss-3 mt-2 max-w-xl">One line. Duration · theme · tier · season · group size.<br>The compiler does the math, builds the PDF, ships the funnel.</p>
   </div>

   <div class="card-flat mb-6">
    <div class="lbl">prompt</div>
    <textarea class="input" id="prompt" placeholder="5 day mindfulness retreat — lux only — green season — 8 pax">${s.prompt||''}</textarea>
    <div class="flex gap-2 mt-2 flex-wrap text-xs">
     <button class="pill pill-moss" onclick="setPrompt('5 day mindfulness retreat — lux only — green season — 8 pax')">mindfulness 5D lux</button>
     <button class="pill pill-moss" onclick="setPrompt('3 day river folklore — mid + lux — dry season — 12 pax')">river folklore 3D</button>
     <button class="pill pill-moss" onclick="setPrompt('7 day detox + meditation — 3 tiers — full year — couples')">detox 7D 3-tier</button>
     <button class="pill pill-moss" onclick="setPrompt('4 day retreat life — lux — full moon Oct 2026 — 6 pax')">retreat life full moon</button>
    </div>
    <div class="flex justify-between items-center mt-4">
     <span class="mono text-moss-3">parser will resolve: duration · theme · tier · season · pax · lunar</span>
     <button class="btn btn-moss" onclick="startCompile()">compile →</button>
    </div>
   </div>

   <div class="flex justify-between items-center mb-3">
    <h2 class="h3">recent runs · ${MOCK_RUNS.length}</h2>
    <a href="#/empty" class="mono text-moss-3 hover:underline">view empty state →</a>
   </div>
   <div class="card-flat" style="padding:0">
    ${hasRuns?MOCK_RUNS.map(r=>`
     <div class="recent" onclick="openRun('${r.id}')">
      <span class="ridx">${r.id}</span>
      <div>
       <div class="text-moss">${r.prompt}</div>
       <div class="mono text-moss-3 mt-1">${r.created} · €${r.cost.toFixed(2)}</div>
      </div>
      <span class="pill ${r.status==='deployed'?'pill-green':r.status==='ready'?'pill-brass':r.status==='rendering'?'pill-moss':'pill-moss'}">${r.status}</span>
      <span class="mono text-moss-3 text-right">${r.subdomain||'—'}</span>
     </div>`).join(''):''}
   </div>

   <div class="mt-8 grid-3">
    <div class="card-flat">
     <div class="lbl">data sources</div>
     <ul class="check-list mt-2">
      <li>Cloudbeds rooms + rates</li>
      <li>Supabase pricelist</li>
      <li>Lunar calendar JSON</li>
      <li>Series taxonomy</li>
     </ul>
    </div>
    <div class="card-flat">
     <div class="lbl">margin floors</div>
     <ul class="check-list mt-2">
      <li>Activities · 35%</li>
      <li>Rooms · 60%</li>
      <li>F&amp;B · 70%</li>
      <li class="text-oxblood">Breach = halt + flag</li>
     </ul>
    </div>
    <div class="card-flat">
     <div class="lbl">output</div>
     <ul class="check-list mt-2">
      <li>9-page branded PDF</li>
      <li>3-page funnel (lead · detail · checkout)</li>
      <li>Vercel deploy + subdomain</li>
      <li>2–3 design variants</li>
     </ul>
    </div>
   </div>
  </div>`;
}

function setPrompt(p){document.getElementById('prompt').value=p;update({prompt:p})}
function startCompile(){
 const p=document.getElementById('prompt').value.trim();
 if(!p){alert('Type a prompt or pick a preset');return}
 update({prompt:p,activeRun:'R-001'});
 nav('/compile?run=R-001');
}
function openRun(id){
 update({activeRun:id});
 const r=MOCK_RUNS.find(x=>x.id===id);
 if(r.status==='draft')nav('/compile?run='+id);
 else if(r.status==='deployed')nav('/funnel/detail?slug='+(r.subdomain||'sample').split('.')[0]);
 else nav('/result?run='+id);
}

function renderCompile(){
 setCrumb(['compiler','compile']);
 const q=getQuery();const runId=q.run||'R-001';
 document.getElementById('app').innerHTML=`
  <div class="container-x" style="max-width:680px">
   <div class="lbl">compiling · ${runId}</div>
   <h1 class="h1 mb-1">Building your <em>retreat</em></h1>
   <p class="text-moss-3 text-sm">~12 seconds. No data is invented — every price traces to Cloudbeds, Supabase, or Sheet.</p>

   <div class="card-flat mt-6">
    <div id="steps">
