name: Vercel Production Deploy

# Triggers Vercel production deploy on push to main, OR manually via workflow_dispatch.
#
# Why this workflow exists:
#   The "normal" Vercel ↔ GitHub integration (a button-click in Vercel that installs a
#   GitHub App on the org) requires GitHub org Owner/Admin role on TBC-HM, which the
#   current Vercel account holder (pbsbase) does not have. This workflow uses Vercel's
#   CLI with a personal access token instead, bypassing the org-admin requirement.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   VERCEL_TOKEN  — generate at https://vercel.com/account/tokens
#                   scope: full account (or scoped to the namkhan-bi project / pbsbase team)
#
# Project + org IDs are NOT secrets — they're committed below as env defaults so the
# workflow is self-documenting. Override per-fork if forking.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: vercel-deploy-${{ github.ref }}
  cancel-in-progress: false   # serialise prod deploys; never cancel a running one mid-flight

env:
  VERCEL_ORG_ID: team_vKod3ZYFgteGCHsam7IG8tEb
  VERCEL_PROJECT_ID: prj_be5AGzi7cB5HnkTEvOWTzUv3YCAl

jobs:
  deploy-production:
    name: vercel · production deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Guard — required secret
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "::error::VERCEL_TOKEN secret is missing. Add it in repo Settings → Secrets and variables → Actions."
            echo "Generate at https://vercel.com/account/tokens (scope: pbsbase-2825's projects → namkhan-bi)."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment (production)
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build (Vercel-style, --prod)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt artefact to production
        id: deploy
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "deploy_url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
          echo "Deployed: $DEPLOY_URL"

      - name: Verify production alias is serving the new build
        run: |
          set -e
          # Give Vercel ~30s to flip the alias
          for i in 1 2 3 4 5 6; do
            CODE=$(curl -sI -m 10 -o /dev/null -w '%{http_code}' https://namkhan-bi.vercel.app/overview || true)
            echo "Try $i: /overview → $CODE"
            if [ "$CODE" = "200" ]; then exit 0; fi
            sleep 5
          done
          echo "::warning::/overview did not return 200 within 30s. Alias may still be flipping; check the dashboard."

      - name: Summary
        run: |
          echo "## ✅ Vercel production deploy" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Commit: \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Branch: \`${{ github.ref_name }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Deploy URL: ${{ steps.deploy.outputs.deploy_url }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Production alias: https://namkhan-bi.vercel.app" >> "$GITHUB_STEP_SUMMARY"
