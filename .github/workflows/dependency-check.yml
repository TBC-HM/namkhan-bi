name: Dependency Check

# Cockpit Health Arm — daily npm audit + outdated check.
# Fails the run on CRITICAL vulns. High/moderate are tracked in GitHub issues
# but do not fail CI — see 2026-06-03 audit decision in claude_md v3.9 §0.16.
#
# Residual accepted-risk inventory (re-evaluate when bumping Next major):
#   high     · next DoS triad   — Image Optimizer remotePatterns / RSC HTTP /
#                                  rewrites smuggling. All require Next 16.x
#                                  (breaking App Router changes — separate bump).
#                                  Vercel edge rate-limit mitigates DoS class.
#   high     · xlsx              — Prototype Pollution + ReDoS. NO upstream fix
#                                  published. Attack surface = our own exports.
#   moderate · postcss           — Transitive via Next; resolves with Next 16.x.

on:
  schedule:
    - cron: '0 5 * * *'   # Daily 05:00 UTC
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: npm audit (critical only)
        run: npm audit --audit-level=critical

      - name: npm audit (high informational, no gate)
        continue-on-error: true
        run: npm audit --audit-level=high

      - name: Outdated check
        run: npm outdated || true   # informational, doesn't fail
