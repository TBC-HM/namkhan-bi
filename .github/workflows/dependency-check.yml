name: Dependency Check

# Cockpit Health Arm — daily npm audit + outdated check.
# Fails the run on high/critical vulns; outdated is informational.

on:
  schedule:
    - cron: '0 5 * * *'   # Daily 05:00 UTC
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: npm audit (high+critical)
        run: npm audit --audit-level=high

      - name: Outdated check
        run: npm outdated || true   # informational, doesn't fail
