name: Supabase migration diff

on:
  pull_request:
    paths:
      - 'supabase/migrations/**'
      - 'supabase/seed.sql'
      - 'supabase/config.toml'

permissions:
  contents: read
  pull-requests: write

jobs:
  diff:
    name: db diff vs linked project (read-only)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

    steps:
      - name: Guard — required secrets
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_PROJECT_REF" ] || [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "::warning::Supabase secrets not configured. Skipping diff. Add SUPABASE_ACCESS_TOKEN, SUPABASE_PROJECT_REF, SUPABASE_DB_PASSWORD in repo Settings → Secrets."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi
        id: guard

      - name: Checkout
        if: steps.guard.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        if: steps.guard.outputs.skip != 'true'
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        if: steps.guard.outputs.skip != 'true'
        run: |
          supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"

      - name: Run db diff
        if: steps.guard.outputs.skip != 'true'
        id: diff
        run: |
          set -o pipefail
          supabase db diff --linked --schema public,plan,dq,gl,app,docs,governance,ops,fb,spa,activities,knowledge,training,guest,marketing,seo,alerts,auth_ext,kpi 2>&1 | tee diff.txt
          if [ -s diff.txt ] && grep -qv '^$' diff.txt; then
            echo "has_diff=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_diff=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment diff on PR
        if: steps.guard.outputs.skip != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const diff = fs.existsSync('diff.txt') ? fs.readFileSync('diff.txt', 'utf8') : '(no output)';
            const hasDiff = '${{ steps.diff.outputs.has_diff }}' === 'true';
            const max = 60000;
            const body = hasDiff
              ? `### Supabase \`db diff --linked\`\n\n⚠ Schema differences detected between this PR and the linked cloud project.\n\n<details><summary>Diff (${diff.length} chars)</summary>\n\n\`\`\`sql\n${diff.slice(0, max)}\n\`\`\`\n\n${diff.length > max ? '_(truncated)_' : ''}\n</details>`
              : `### Supabase \`db diff --linked\`\n\n✅ No schema differences. Git and the cloud project (\`${process.env.SUPABASE_PROJECT_REF}\`) are in parity.`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.startsWith('### Supabase `db diff --linked`'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
